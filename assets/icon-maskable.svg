<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background fills the whole maskable area -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- artwork scaled to 0.8 around centre so nothing is clipped by the adaptive mask -->
  <g transform="translate(256 256) scale(0.8) translate(-256 -256)">
    <g fill="none" stroke="#38bdf8" stroke-opacity="0.22" stroke-width="6">
      <circle cx="256" cy="270" r="150"/>
      <circle cx="256" cy="270" r="100"/>
      <circle cx="256" cy="270" r="50"/>
    </g>
    <path d="M256 270 L256 120 A150 150 0 0 1 386 195 Z" fill="#38bdf8" fill-opacity="0.14"/>
    <line x1="256" y1="270" x2="386" y2="195" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="5"/>
    <g transform="translate(256 248) scale(1.6)">
      <path d="M0 -78 L70 -18 L70 70 L-70 70 L-70 -18 Z" fill="url(#amber)"/>
      <path d="M0 -92 L86 -18 L70 -2 L0 -64 L-70 -2 L-86 -18 Z" fill="#fde68a"/>
      <rect x="-22" y="6" width="44" height="64" rx="4" fill="#0f172a"/>
      <circle cx="0" cy="-12" r="13" fill="#0f172a"/>
    </g>
    <text x="256" y="438" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif"
          font-size="74" font-weight="800" letter-spacing="2" fill="#f59e0b">BAM</text>
    <text x="256" y="476" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif"
          font-size="26" font-weight="700" letter-spacing="6" fill="#94a3b8">SCI · RADAR</text>
  </g>
</svg>
